name: Deploy ALLEN

on:
  workflow_run:
    workflows: ["Publish ALLEN Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-allen
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy to ALLEN server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTROL_HOST }}
          username: ${{ secrets.CONTROL_USER }}
          key: ${{ secrets.CONTROL_SSH_KEY }}
          envs: DOPPLER_TOKEN,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd ~/allen
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose pull allen
            docker compose up -d --force-recreate allen
            echo "=== allen logs (last 30 lines) ==="
            sleep 10
            docker compose logs --tail=30 allen
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
