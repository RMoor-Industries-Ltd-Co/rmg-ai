name: Publish ALLEN Image

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image vars
        id: vars
        shell: bash
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "prefix=ghcr.io/$OWNER_LC/rmg-ai" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push allen
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.prefix }}/allen:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.prefix }}/allen:latest

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment: control
    permissions:
      contents: read
      packages: read
    steps:
      - name: Pull and restart allen on control server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTROL_HOST }}
          username: ${{ secrets.CONTROL_USER }}
          key: ${{ secrets.CONTROL_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull ghcr.io/rmoor-industries-ltd-co/rmg-ai/allen:latest
            cd /opt/rmg-creator-os/control-server
            doppler run -- docker compose up -d allen
            echo "=== allen logs (last 30 lines) ==="
            docker logs control-server-allen-1 --tail 30 2>&1 || true
