<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0d12" />
<link rel="icon" type="image/svg+xml" href="/static/ALLEN-ALLIE.svg" />
<title>ALLEN·I·VERSE</title>
<style>
  :root { --bg:#0b0d12; --panel:#11141c; --line:#222838; --text:#e8eaf0; --muted:#8a90a2; --gold:#d9b35a; --gold2:#f6e7b0; --user:#1d2b3a; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  body { display:flex; flex-direction:column; height:100dvh; }
  header { display:flex; align-items:center; gap:10px; padding:14px 16px calc(14px); border-bottom:1px solid var(--line); padding-top:max(14px,env(safe-area-inset-top)); }
  .mark { width:34px; height:34px; flex:none; border-radius:7px; object-fit:contain; }
  .brand { font-weight:800; letter-spacing:.14em; font-size:15px; background:linear-gradient(135deg,var(--gold2),var(--gold)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  header .sub { color:var(--muted); font-size:11px; margin-left:2px; }
  header .spacer { flex:1; }
  .icon-btn { background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:9px; padding:7px 11px; font-size:14px; cursor:pointer; }
  .icon-btn:hover { color:var(--gold); border-color:var(--gold); }
  /* login */
  #login { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:24px; text-align:center; }
  #login .big { font-size:30px; font-weight:800; letter-spacing:.16em; background:linear-gradient(135deg,var(--gold2),var(--gold)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #login p { color:var(--muted); max-width:30ch; }
  /* home */
  #home { flex:1; display:flex; align-items:center; justify-content:center; padding:24px; overflow-y:auto; }
  .home-inner { display:flex; flex-direction:column; align-items:center; text-align:center; gap:16px; max-width:560px; }
  .home-logo { width:min(150px,40vw); border-radius:18px; }
  .home-greet { font-size:22px; font-weight:700; }
  .quote { font-size:21px; line-height:1.5; margin:4px 0; color:var(--gold2); font-style:italic; max-width:32ch; }
  .rate { display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center; }
  .thumb { font-size:20px; background:transparent; border:1px solid var(--line); border-radius:10px; padding:7px 11px; cursor:pointer; filter:grayscale(1) opacity(.5); transition:.12s; }
  .thumb.on { filter:none; border-color:var(--gold); background:#1a1710; }
  .notfor { background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:10px; padding:8px 12px; font-size:13px; cursor:pointer; }
  .notfor.on { color:#ff6b6b; border-color:#c0392b; }
  .home-actions { display:flex; gap:10px; align-items:center; margin-top:6px; }
  .home-actions .btn { margin:0; }
  /* chat */
  #log { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .empty { margin:auto; text-align:center; color:var(--muted); }
  .starters { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:14px; }
  .starter { background:var(--panel); border:1px solid var(--line); color:var(--text); border-radius:999px; padding:9px 15px; font-size:13px; cursor:pointer; }
  .bubble { max-width:86%; padding:11px 14px; border-radius:15px; line-height:1.5; white-space:pre-wrap; word-wrap:break-word; }
  .bubble.user { align-self:flex-end; background:var(--user); border:1px solid var(--line); }
  .bubble.allen { align-self:flex-start; background:var(--panel); border:1px solid var(--line); }
  .role { font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:3px; }
  .acts { display:flex; gap:8px; margin-top:7px; }
  .acts button { background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:8px; padding:4px 10px; font-size:12px; cursor:pointer; }
  /* input bar */
  form { display:flex; gap:8px; padding:10px 12px; padding-bottom:max(10px,env(safe-area-inset-bottom)); border-top:1px solid var(--line); background:var(--bg); }
  form input[type=text] { flex:1; background:var(--panel); color:var(--text); border:1px solid var(--line); border-radius:12px; padding:13px 14px; font-size:16px; }
  .send, .mic { flex:none; border-radius:12px; border:1px solid var(--line); background:var(--panel); color:var(--text); font-size:17px; padding:0 16px; cursor:pointer; }
  .send { background:linear-gradient(135deg,var(--gold2),var(--gold)); color:#1a1206; font-weight:700; border:none; }
  .mic.rec { background:#3a1d1d; border-color:#c0392b; color:#ff6b6b; animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
  /* memory drawer */
  #mem { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; z-index:20; }
  #mem.open { display:block; }
  #mem .sheet { position:absolute; right:0; top:0; bottom:0; width:min(420px,92vw); background:var(--panel); border-left:1px solid var(--line); padding:18px; overflow-y:auto; padding-top:max(18px,env(safe-area-inset-top)); }
  #mem h3 { margin:0 0 12px; }
  .mem-add { display:flex; gap:8px; margin-bottom:12px; }
  .mem-add input { flex:1; background:var(--bg); color:var(--text); border:1px solid var(--line); border-radius:9px; padding:10px; font-size:15px; }
  .mem-list { list-style:none; margin:0; padding:0; display:grid; gap:7px; }
  .mem-list li { display:flex; align-items:center; justify-content:space-between; gap:10px; background:var(--bg); border:1px solid var(--line); border-radius:9px; padding:9px 11px; font-size:14px; }
  .mem-list li > span:first-child { flex:1; min-width:0; }
  .mem-list .x { flex:none; background:transparent; border:1px solid var(--line); border-radius:6px; color:var(--muted); cursor:pointer; padding:3px 9px; font-size:13px; }
  .mem-list .x:hover { color:#ff6b6b; border-color:#c0392b; }
  .mem-list .lane-head { background:transparent; border:none; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--gold); padding:10px 2px 2px; }
  .silo { font-size:9px; text-transform:uppercase; letter-spacing:.03em; background:#1d2b3a; color:var(--gold2); border-radius:4px; padding:1px 5px; }
  .muted { color:var(--muted); }
  .err { color:#ff6b6b; font-size:13px; padding:0 16px; }
  /* chats drawer (left) */
  #convs { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; z-index:20; }
  #convs.open { display:block; }
  #convs .sheet.left { position:absolute; left:0; top:0; bottom:0; width:min(360px,88vw); background:var(--panel); border-right:1px solid var(--line); padding:18px; overflow-y:auto; padding-top:max(18px,env(safe-area-inset-top)); }
  .conv-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .conv-top h3 { margin:0; }
  .conv-list { list-style:none; margin:0; padding:0; display:grid; gap:4px; }
  .folder-head { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--gold); padding:12px 2px 4px; }
  .conv-item { display:flex; align-items:center; justify-content:space-between; gap:8px; background:var(--bg); border:1px solid var(--line); border-radius:9px; padding:10px 11px; font-size:14px; }
  .conv-item.active { border-color:var(--gold); }
  .conv-title { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; }
  .conv-item .x { background:transparent; border:none; color:var(--muted); cursor:pointer; flex:none; font-size:12px; padding:2px 3px; }
  .conv-item .x:hover { color:var(--gold); }
  .conv-acts { display:flex; gap:1px; flex:none; }
</style>
</head>
<body>
<header>
  <img class="mark" id="logoHome" src="/static/ALLEN-ALLIE.svg" alt="ALLEN·I·VERSE — home" title="Home" style="cursor:pointer" />
  <div>
    <div class="brand">ALLEN·I·VERSE</div>
    <div class="sub" id="who">the intelligence answer</div>
  </div>
  <div class="spacer"></div>
  <button class="icon-btn" id="newChatTop" title="New chat" style="display:none">➕</button>
  <button class="icon-btn" id="convBtn" title="Chats" style="display:none">💬</button>
  <button class="icon-btn" id="speakToggle" title="Speak replies">🔊</button>
  <button class="icon-btn" id="memBtn" title="Memory" style="display:none">🧠</button>
  <button class="icon-btn" id="outBtn" title="Sign out" style="display:none">⏻</button>
</header>

<div id="login">
  <img src="/static/ALLEN-ALLIE.svg" alt="" style="width:min(200px,52vw);border-radius:18px" />
  <div class="big">ALLEN·I·VERSE</div>
  <p>the intelligence answer — ALLEN &amp; ALLIE's front door. Sign in to continue.</p>
  <div id="gbtn"></div>
  <p class="err" id="loginErr"></p>
</div>

<div id="app" style="display:none; flex:1; min-height:0; flex-direction:column;">
  <div id="log">
    <div class="empty" id="empty">
      <p class="muted">Talk to ALLEN. He answers out loud.</p>
      <div class="starters">
        <button class="starter">What should we focus on today?</button>
        <button class="starter">Give me an ORR cruise hook.</button>
        <button class="starter">What do you remember about me?</button>
      </div>
    </div>
  </div>
  <p class="err" id="err"></p>
  <form id="f">
    <button type="button" class="mic" id="mic" title="Talk">🎙️</button>
    <input type="text" id="msg" placeholder="Ask ALLEN…" autocomplete="off" />
    <button type="submit" class="send">↑</button>
  </form>
</div>

<div id="home" style="display:none">
  <div class="home-inner">
    <img src="/static/ALLEN-ALLIE.svg" alt="" class="home-logo" />
    <div class="home-greet" id="greet">Welcome back.</div>
    <blockquote class="quote" id="quote">…</blockquote>
    <div class="rate" id="rate" title="More thumbs = you'll see it more often">
      <button data-r="1" class="thumb">👍</button>
      <button data-r="2" class="thumb">👍</button>
      <button data-r="3" class="thumb">👍</button>
      <button data-r="0" class="notfor">🚫 not for me</button>
    </div>
    <div class="rate-msg muted" id="rateMsg"></div>
    <div class="home-actions">
      <button class="btn" id="enterChat">Talk to ALLEN →</button>
      <button class="icon-btn" id="anotherQuote">↻ Another</button>
    </div>
  </div>
</div>

<div id="convs"><div class="sheet left">
  <div class="conv-top"><h3>💬 Chats</h3><span style="display:flex;gap:6px"><button class="icon-btn" id="newFolder" title="New project folder">📁+</button><button class="icon-btn" id="newConv">+ New</button></span></div>
  <ul class="conv-list" id="convList"></ul>
</div></div>

<div id="mem"><div class="sheet">
  <h3>🧠 Memory</h3>
  <div class="mem-add">
    <input id="memIn" placeholder="Tell ALLEN to remember…" />
    <button class="icon-btn" id="memAdd">Add</button>
  </div>
  <ul class="mem-list" id="memList"></ul>
</div></div>

<audio id="audio" hidden></audio>

<script>
const $ = s => document.querySelector(s);
let autoSpeak = true, turns = [], recorder = null, chunks = [], convId = null, pendingFolder = 'General';

async function api(path, opts={}) {
  const r = await fetch(path, { credentials:'same-origin', ...opts });
  if (r.status === 401) { showLogin(); throw new Error('login'); }
  return r;
}
function showLogin(){ $('#login').style.display='flex'; $('#home').style.display='none'; $('#app').style.display='none'; ['newChatTop','convBtn','memBtn','outBtn'].forEach(id=>$('#'+id).style.display='none'); }
function showApp(email){ $('#login').style.display='none'; ['newChatTop','convBtn','memBtn','outBtn'].forEach(id=>$('#'+id).style.display=''); if(email) $('#outBtn').title='Sign out ('+email+')'; initChats(); showHome(); }
function showHome(){ $('#login').style.display='none'; $('#app').style.display='none'; $('#home').style.display='flex'; loadInspiration(); }
function enterChat(){ $('#login').style.display='none'; $('#home').style.display='none'; $('#app').style.display='flex'; $('#log').scrollTop=$('#log').scrollHeight; }

let currentInsp=null;
async function loadInspiration(){
  const h=new Date().getHours(); const part=h<5?'late night':h<12?'morning':h<18?'afternoon':'evening';
  $('#greet').textContent=(h<5?'Burning the midnight oil':'Good '+part)+', Rahm.';
  $('#rateMsg').textContent='';
  try{ const r=await api('/console/inspiration'); currentInsp=await r.json(); $('#quote').textContent='“'+(currentInsp.text||'Make today count.')+'”'; reflectRating(currentInsp.rating||0); }
  catch(e){ $('#quote').textContent='Make today count.'; }
}
function reflectRating(r){ document.querySelectorAll('#rate .thumb').forEach(b=>b.classList.toggle('on', r>0 && parseInt(b.dataset.r)<=r)); document.querySelector('#rate .notfor').classList.toggle('on', r===0); }
async function rateInspiration(r){
  if(!currentInsp||!currentInsp.id) return;
  reflectRating(r); currentInsp.rating=r;
  try{ await api('/console/inspiration/'+currentInsp.id+'/rate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rating:r})}); }catch(e){}
  $('#rateMsg').textContent = r===0?"Got it — you won't see that one again." : (r===3?"Locked in — you'll see this one often.":"Saved — "+r+" thumb"+(r>1?'s':'')+", more likely to return.");
}

function clearLog(showEmpty){ turns=[]; $('#log').innerHTML=''; if(showEmpty){ const e=document.createElement('div'); e.className='empty'; e.id='empty'; e.innerHTML='<p class="muted">Talk to ALLEN. He answers out loud.</p>'; $('#log').appendChild(e); } }
async function initChats(){ try{ const r=await api('/console/conversations'); const d=await r.json(); const cs=d.conversations||[]; if(cs.length){ openConversation(cs[0].id); } else { clearLog(true); } }catch(e){ clearLog(true); } }
async function loadConvs(){ try{ const r=await api('/console/conversations'); const d=await r.json(); const ul=$('#convList'); ul.innerHTML='';
  const cs=d.conversations||[]; if(!cs.length){ ul.innerHTML='<li class="muted">No chats yet.</li>'; return; }
  const folders={}; cs.forEach(c=>{ const f=c.folder||'General'; (folders[f]=folders[f]||[]).push(c); });
  Object.keys(folders).forEach(folder=>{ const h=document.createElement('li'); h.className='folder-head'; h.textContent='📁 '+folder; ul.appendChild(h);
    folders[folder].forEach(c=>{ const li=document.createElement('li'); li.className='conv-item'+(c.id===convId?' active':'');
      const t=document.createElement('span'); t.className='conv-title'; t.textContent=c.title; t.onclick=()=>openConversation(c.id); li.appendChild(t);
      const acts=document.createElement('span'); acts.className='conv-acts';
      const ren=document.createElement('button'); ren.className='x'; ren.textContent='✎'; ren.title='Rename'; ren.onclick=(e)=>{ e.stopPropagation(); renameConv(c); }; acts.appendChild(ren);
      const mv=document.createElement('button'); mv.className='x'; mv.textContent='📁'; mv.title='Move to folder'; mv.onclick=(e)=>{ e.stopPropagation(); moveConv(c); }; acts.appendChild(mv);
      const x=document.createElement('button'); x.className='x'; x.textContent='✕'; x.title='Delete'; x.onclick=async(e)=>{ e.stopPropagation(); await api('/console/conversations/'+c.id,{method:'DELETE'}); if(c.id===convId){ convId=null; clearLog(true); } loadConvs(); }; acts.appendChild(x);
      li.appendChild(acts); ul.appendChild(li); }); });
 }catch(e){} }
async function openConversation(id){ try{ const r=await api('/console/conversations/'+id); const d=await r.json(); convId=id; clearLog(false);
  (d.messages||[]).forEach(m=> add(m.role==='assistant'?'allen':'user', m.content));
  turns=(d.messages||[]).map(m=>({role:m.role==='assistant'?'assistant':'user',content:m.content}));
  if(!(d.messages||[]).length){ clearLog(true); }
  $('#convs').classList.remove('open'); enterChat();
 }catch(e){} }
function newChat(folder){ convId=null; pendingFolder=folder||'General'; clearLog(true); $('#convs').classList.remove('open'); enterChat(); $('#msg').focus(); }
async function renameConv(c){ const t=prompt('Rename conversation:', c.title); if(t!==null && t.trim()){ await api('/console/conversations/'+c.id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t.trim()})}); loadConvs(); } }
async function moveConv(c){ const f=prompt('Move to project folder:', c.folder||'General'); if(f!==null && f.trim()){ await api('/console/conversations/'+c.id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({folder:f.trim()})}); loadConvs(); } }

async function boot(){
  const cfg = await (await fetch('/auth/config')).json();
  try {
    const me = await (await fetch('/auth/me',{credentials:'same-origin'})).json();
    if (me.email) { showApp(me.email); return; }
  } catch(e){}
  // not logged in -> render Google button
  if (!cfg.enabled){ $('#loginErr').textContent='Sign-in not configured on the server.'; return; }
  const s = document.createElement('script'); s.src='https://accounts.google.com/gsi/client'; s.async=true;
  s.onload = () => {
    google.accounts.id.initialize({ client_id: cfg.clientId, callback: async (resp) => {
      const r = await fetch('/auth/google',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({credential:resp.credential})});
      if (r.ok){ const d=await r.json(); showApp(d.email); } else { $('#loginErr').textContent='That account is not authorized.'; }
    }});
    google.accounts.id.renderButton($('#gbtn'), { theme:'filled_black', size:'large', shape:'pill', text:'continue_with' });
  };
  document.body.appendChild(s);
}

function add(role, text){
  const em=$('#empty'); if(em) em.style.display='none';
  const b=document.createElement('div'); b.className='bubble '+role;
  b.innerHTML='<div class="role">'+(role==='user'?'You':'ALLEN')+'</div>';
  const t=document.createElement('div'); t.textContent=text; b.appendChild(t);
  if(role==='allen'){ const a=document.createElement('div'); a.className='acts';
    const sp=document.createElement('button'); sp.textContent='🔊'; sp.onclick=()=>speak(text); a.appendChild(sp);
    const cp=document.createElement('button'); cp.textContent='📋'; cp.onclick=()=>navigator.clipboard.writeText(text); a.appendChild(cp);
    b.appendChild(a); }
  $('#log').appendChild(b); $('#log').scrollTop=$('#log').scrollHeight; return b;
}
async function speak(text){ try{ const r=await api('/console/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})}); const u=URL.createObjectURL(await r.blob()); const a=$('#audio'); a.src=u; a.play(); }catch(e){} }

async function send(text){
  const m=text.trim(); if(!m) return; $('#msg').value=''; $('#err').textContent='';
  add('user',m); const hist=turns.slice(-8); turns.push({role:'user',content:m});
  const thinking=add('allen','…');
  try {
    const wasNew=!convId;
    const r=await api('/console/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:m,history:hist,conversationId:convId,folder:pendingFolder,now:new Date().toString()})});
    const d=await r.json(); thinking.querySelector('div:last-child').textContent=d.reply||'(no reply)';
    turns.push({role:'assistant',content:d.reply});
    if(d.conversationId) convId=d.conversationId;
    if(autoSpeak && d.reply) speak(d.reply);
    if(d.memoryChanged) loadMem();
    if(wasNew) loadConvs();
  } catch(e){ thinking.remove(); if(e.message!=='login') $('#err').textContent=String(e); }
}

// mic -> transcribe -> auto-send
async function toggleMic(){
  if(recorder){ recorder.stop(); return; }
  try {
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recorder=new MediaRecorder(stream); chunks=[];
    recorder.ondataavailable=e=>e.data.size&&chunks.push(e.data);
    recorder.onstop=async()=>{ stream.getTracks().forEach(t=>t.stop()); $('#mic').classList.remove('rec'); recorder=null;
      const blob=new Blob(chunks,{type:'audio/webm'}); if(blob.size<1500) return;
      const fd=new FormData(); fd.append('file',blob,'speech.webm');
      try{ const r=await api('/console/listen',{method:'POST',body:fd}); const d=await r.json(); if(d.text&&d.text.trim()) send(d.text); }catch(e){}
    };
    recorder.start(); $('#mic').classList.add('rec');
  } catch(e){ $('#err').textContent='Mic unavailable.'; }
}

// memory drawer
async function loadMem(){ try{ const r=await api('/console/memory'); const d=await r.json(); const ul=$('#memList'); ul.innerHTML='';
  const mems=d.memories||[];
  if(!mems.length){ ul.innerHTML='<li class="muted">No memories yet. Tell ALLEN anything and he’ll file it.</li>'; return; }
  const lanes={}; mems.forEach(m=>{ const l=m.lane||'personal'; (lanes[l]=lanes[l]||[]).push(m); });
  const order=['business','personal'].concat(Object.keys(lanes).filter(l=>l!=='business'&&l!=='personal'));
  order.forEach(lane=>{ const items=lanes[lane]; if(!items||!items.length) return;
    const h=document.createElement('li'); h.className='lane-head'; h.textContent=lane==='business'?'💼 Business':(lane==='personal'?'🏡 Personal':lane); ul.appendChild(h);
    items.forEach(m=>{ const li=document.createElement('li');
      const wrap=document.createElement('span'); wrap.style.minWidth='0';
      if(m.silo){ const b=document.createElement('span'); b.className='silo'; b.textContent=m.silo; wrap.appendChild(b); }
      wrap.appendChild(document.createTextNode(' '+m.content)); li.appendChild(wrap);
      const x=document.createElement('button'); x.className='x'; x.textContent='✕'; x.onclick=async()=>{ await api('/console/memory/'+m.id,{method:'DELETE'}); loadMem(); }; li.appendChild(x);
      ul.appendChild(li); });
  });
 }catch(e){} }

// wires
$('#f').addEventListener('submit',e=>{e.preventDefault();send($('#msg').value);});
$('#mic').addEventListener('click',toggleMic);
$('#convBtn').addEventListener('click',()=>{ $('#convs').classList.add('open'); loadConvs(); });
$('#convs').addEventListener('click',e=>{ if(e.target.id==='convs') $('#convs').classList.remove('open'); });
$('#newConv').addEventListener('click',()=>newChat('General'));
$('#newChatTop').addEventListener('click',()=>newChat('General'));
$('#logoHome').addEventListener('click',showHome);
$('#enterChat').addEventListener('click',enterChat);
$('#anotherQuote').addEventListener('click',loadInspiration);
document.querySelectorAll('#rate button').forEach(b=>b.addEventListener('click',()=>rateInspiration(parseInt(b.dataset.r))));
$('#newFolder').addEventListener('click',()=>{ const f=prompt('New project folder name:'); if(f && f.trim()){ newChat(f.trim()); } });
$('#speakToggle').addEventListener('click',()=>{autoSpeak=!autoSpeak; $('#speakToggle').style.opacity=autoSpeak?'1':'.4';});
$('#memBtn').addEventListener('click',()=>{ $('#mem').classList.add('open'); loadMem(); });
$('#mem').addEventListener('click',e=>{ if(e.target.id==='mem') $('#mem').classList.remove('open'); });
$('#memAdd').addEventListener('click',async()=>{ const v=$('#memIn').value.trim(); if(!v) return; await api('/console/memory',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:v})}); $('#memIn').value=''; loadMem(); });
$('#outBtn').addEventListener('click',async()=>{ await fetch('/auth/logout',{method:'POST',credentials:'same-origin'}); showLogin(); });
document.querySelectorAll('.starter').forEach(b=>b.addEventListener('click',()=>send(b.textContent)));
boot();
</script>
</body>
</html>
